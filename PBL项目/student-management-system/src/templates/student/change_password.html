{% extends "base.html" %}

{% block title %}修改密码 - 学生信息管理系统{% endblock %}

{% block content %}
<div class="container-fluid">
    <!-- 页面标题 -->
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="fas fa-key"></i> 修改密码
        </h1>
        <a href="{{ url_for('student_profile') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> 返回资料页面
        </a>
    </div>

    <div class="row">
        <div class="col-md-8 col-lg-6 mx-auto">
            <div class="card shadow">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">
                        <i class="fas fa-lock"></i> 密码修改
                    </h6>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="current_password" class="form-label">
                                <i class="fas fa-lock-open text-danger"></i> 当前密码 *
                            </label>
                            <input type="password" class="form-control" id="current_password" 
                                   name="current_password" required>
                            <small class="text-muted">请输入您当前的密码</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="new_password" class="form-label">
                                <i class="fas fa-lock text-success"></i> 新密码 *
                            </label>
                            <input type="password" class="form-control" id="new_password" 
                                   name="new_password" minlength="6" required>
                            <small class="text-muted">密码长度至少6位</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">
                                <i class="fas fa-check-circle text-primary"></i> 确认新密码 *
                            </label>
                            <input type="password" class="form-control" id="confirm_password" 
                                   name="confirm_password" minlength="6" required>
                            <small class="text-muted">请再次输入新密码以确认</small>
                        </div>
                        
                        <!-- 密码强度指示器 -->
                        <div class="mb-3">
                            <label class="form-label">密码强度</label>
                            <div class="progress mb-2" style="height: 8px;">
                                <div class="progress-bar" id="passwordStrength" 
                                     role="progressbar" style="width: 0%"></div>
                            </div>
                            <small class="text-muted" id="strengthText">请输入密码查看强度</small>
                        </div>
                        
                        <hr>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('student_profile') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> 取消
                            </a>
                            <button type="submit" class="btn btn-primary" id="submitBtn" disabled>
                                <i class="fas fa-save"></i> 修改密码
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 安全提示 -->
    <div class="row mt-4">
        <div class="col-md-8 col-lg-6 mx-auto">
            <div class="card border-left-info">
                <div class="card-body">
                    <h6 class="text-info mb-2">
                        <i class="fas fa-shield-alt"></i> 安全提示
                    </h6>
                    <ul class="mb-0 text-muted small">
                        <li>密码修改后请记住新密码，忘记密码请联系管理员</li>
                        <li>建议使用包含大小写字母、数字和特殊字符的强密码</li>
                        <li>不要使用生日、姓名等容易猜测的密码</li>
                        <li>定期更换密码以提高账户安全性</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// 密码强度检测
document.getElementById('new_password').addEventListener('input', function() {
    const password = this.value;
    const strengthBar = document.getElementById('passwordStrength');
    const strengthText = document.getElementById('strengthText');
    const submitBtn = document.getElementById('submitBtn');
    
    let strength = 0;
    let strengthColor = '';
    let strengthLabel = '';
    
    if (password.length >= 6) strength += 1;
    if (/[a-z]/.test(password)) strength += 1;
    if (/[A-Z]/.test(password)) strength += 1;
    if (/[0-9]/.test(password)) strength += 1;
    if (/[^A-Za-z0-9]/.test(password)) strength += 1;
    
    switch(strength) {
        case 0:
        case 1:
            strengthColor = 'bg-danger';
            strengthLabel = '很弱';
            break;
        case 2:
            strengthColor = 'bg-warning';
            strengthLabel = '弱';
            break;
        case 3:
            strengthColor = 'bg-info';
            strengthLabel = '中等';
            break;
        case 4:
            strengthColor = 'bg-primary';
            strengthLabel = '强';
            break;
        case 5:
            strengthColor = 'bg-success';
            strengthLabel = '很强';
            break;
    }
    
    const percentage = (strength / 5) * 100;
    strengthBar.style.width = percentage + '%';
    strengthBar.className = 'progress-bar ' + strengthColor;
    strengthText.textContent = '密码强度: ' + strengthLabel;
    
    // 检查表单完整性
    checkFormValidity();
});

// 确认密码验证
document.getElementById('confirm_password').addEventListener('input', function() {
    checkFormValidity();
});

document.getElementById('current_password').addEventListener('input', function() {
    checkFormValidity();
});

function checkFormValidity() {
    const currentPassword = document.getElementById('current_password').value;
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const submitBtn = document.getElementById('submitBtn');
    
    const isValid = currentPassword.length > 0 && 
                   newPassword.length >= 6 && 
                   newPassword === confirmPassword &&
                   newPassword !== currentPassword;
    
    submitBtn.disabled = !isValid;
}

// 表单提交前验证
document.querySelector('form').addEventListener('submit', function(e) {
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    if (newPassword !== confirmPassword) {
        e.preventDefault();
        alert('新密码和确认密码不一致！');
        return false;
    }
});
</script>
{% endblock %}
